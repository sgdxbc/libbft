<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">libbft logo</title>
  <desc id="desc">A geometric byzantine fault tolerant network mark with four validator nodes, quorum links, and a minimal linker-library core.</desc>

  <defs>
    <linearGradient id="ringGradient" x1="184" y1="164" x2="840" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F4C81"/>
      <stop offset="0.55" stop-color="#0A7EA4"/>
      <stop offset="1" stop-color="#0E9F6E"/>
    </linearGradient>

    <linearGradient id="coreGradient" x1="420" y1="380" x2="620" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E5F4FF"/>
    </linearGradient>

    <linearGradient id="goodNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16A3D7"/>
      <stop offset="1" stop-color="#0E8EBA"/>
    </linearGradient>

    <linearGradient id="badNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8B7B"/>
      <stop offset="1" stop-color="#E35D5D"/>
    </linearGradient>

    <filter id="softShadow" x="120" y="120" width="784" height="784" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0D3557" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Outer safety ring: resilient protocol envelope -->
  <g filter="url(#softShadow)">
    <circle cx="512" cy="512" r="352" stroke="url(#ringGradient)" stroke-width="44"/>
  </g>

  <!-- Quorum links: all-to-all communication across validators -->
  <g stroke="#1A628D" stroke-opacity="0.22" stroke-width="18" stroke-linecap="round">
    <line x1="512" y1="196" x2="796" y2="512"/>
    <line x1="512" y1="196" x2="512" y2="828"/>
    <line x1="512" y1="196" x2="228" y2="512"/>
    <line x1="228" y1="512" x2="796" y2="512"/>
    <line x1="228" y1="512" x2="512" y2="828"/>
    <line x1="796" y1="512" x2="512" y2="828"/>
  </g>

  <!-- Validator nodes: 3 honest + 1 faulty -->
  <g>
    <circle cx="512" cy="196" r="54" fill="url(#goodNode)"/>
    <circle cx="228" cy="512" r="54" fill="url(#goodNode)"/>
    <circle cx="796" cy="512" r="54" fill="url(#goodNode)"/>
    <circle cx="512" cy="828" r="54" fill="url(#badNode)"/>

    <circle cx="512" cy="196" r="63" stroke="#FFFFFF" stroke-opacity="0.86" stroke-width="8"/>
    <circle cx="228" cy="512" r="63" stroke="#FFFFFF" stroke-opacity="0.86" stroke-width="8"/>
    <circle cx="796" cy="512" r="63" stroke="#FFFFFF" stroke-opacity="0.86" stroke-width="8"/>
    <circle cx="512" cy="828" r="63" stroke="#FFFFFF" stroke-opacity="0.86" stroke-width="8"/>
  </g>

  <!-- Linker-library core: symmetric code brackets converging into one stable binary core -->
  <g>
    <rect x="380" y="380" width="264" height="264" rx="58" fill="url(#coreGradient)"/>
    <rect x="380" y="380" width="264" height="264" rx="58" stroke="#1A628D" stroke-opacity="0.32" stroke-width="12"/>

    <path d="M470 456H444V568H470" stroke="#0D7FA8" stroke-opacity="0.80" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M554 456H580V568H554" stroke="#0D7FA8" stroke-opacity="0.80" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="488" y="480" width="48" height="64" rx="12" fill="#0D7FA8" fill-opacity="0.14" stroke="#0D7FA8" stroke-opacity="0.78" stroke-width="8"/>
    <line x1="488" y1="512" x2="470" y2="512" stroke="#0D7FA8" stroke-opacity="0.78" stroke-width="8" stroke-linecap="round"/>
    <line x1="536" y1="512" x2="554" y2="512" stroke="#0D7FA8" stroke-opacity="0.78" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
